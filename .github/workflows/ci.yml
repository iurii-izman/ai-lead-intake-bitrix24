name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml --junitxml=pytest.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-artifacts
          path: |
            coverage.xml
            pytest.xml

name: Sonar

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Check Sonar configuration
        id: sonar_config
        shell: bash
        run: |
          if [[ -n "${SONAR_TOKEN}" && -n "${SONAR_PROJECT_KEY}" && -n "${SONAR_ORGANIZATION}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonar configuration is missing; skipping scan."
          fi

      - name: Checkout
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.sonar_config.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests with coverage
        if: steps.sonar_config.outputs.enabled == 'true'
        run: pytest -q --cov=app --cov-report=xml

      - name: Sonar scan
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.python.version=3.12
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml

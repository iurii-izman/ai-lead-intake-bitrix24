<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or "AI Lead Intake Admin" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.24), transparent 34%),
          radial-gradient(circle at top right, rgba(16, 185, 129, 0.18), transparent 28%),
          linear-gradient(180deg, #081120 0%, #0b1220 45%, #0f172a 100%);
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-100">
    <header class="border-b border-white/10 bg-slate-950/60 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div>
          <p class="text-xs uppercase tracking-[0.32em] text-slate-400">AI Lead Intake</p>
          <h1 class="text-lg font-semibold text-white">Bitrix24 Admin Dashboard</h1>
        </div>
        <nav class="flex flex-wrap gap-2 text-sm">
          <a class="rounded-full px-3 py-1.5 {{ 'bg-white/15 text-white' if active_page == 'dashboard' else 'text-slate-300 hover:bg-white/10' }}" href="/">Dashboard</a>
          <a class="rounded-full px-3 py-1.5 {{ 'bg-white/15 text-white' if active_page == 'requests' else 'text-slate-300 hover:bg-white/10' }}" href="/admin/requests">Requests</a>
          <a class="rounded-full px-3 py-1.5 {{ 'bg-white/15 text-white' if active_page == 'review' else 'text-slate-300 hover:bg-white/10' }}" href="/admin/review">Review</a>
          <a class="rounded-full px-3 py-1.5 {{ 'bg-white/15 text-white' if active_page == 'settings' else 'text-slate-300 hover:bg-white/10' }}" href="/admin/settings">Settings</a>
        </nav>
      </div>
    </header>
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
